# quizzler-api: Spring Boot backend, 2 replicas.
#
# Cross-service URLs:
#   - SPRING_DATASOURCE_URL  -> quizzler-db in this namespace
#   - PAYMENT_API_BASE_URL   -> payment-api in the payment namespace (server-to-server)
#   - QUIZZLER_API_BASE_URL  -> this API's own FQDN; handed to payment-api as the
#                               success webhook, so it must resolve from the
#                               payment namespace (hence the fully-qualified name)
#   - QUIZZLER_UI_BASE_URL   -> browser-facing ingress host for the post-payment redirect
apiVersion: v1
kind: ConfigMap
metadata:
  name: quizzler-api-config
  namespace: quizzler
data:
  SPRING_DATASOURCE_URL: jdbc:postgresql://quizzler-db:5432/quizzler
  SPRING_DATASOURCE_USERNAME: quizzler
  SPRING_DATASOURCE_PASSWORD: quizzler
  PAYMENT_API_BASE_URL: http://payment-api.payment.svc.cluster.local:8081
  QUIZZLER_API_BASE_URL: http://quizzler-api.quizzler.svc.cluster.local:8080
  QUIZZLER_UI_BASE_URL: http://quizzler.localhost
  CORS_ALLOWED_ORIGINS: http://quizzler.localhost
  # RabbitMQ lives in the dedicated messaging namespace; consume payment-confirmed events from it.
  SPRING_RABBITMQ_HOST: rabbitmq.messaging.svc.cluster.local
  SPRING_RABBITMQ_PORT: "5672"
  SPRING_RABBITMQ_USERNAME: quizzler-mq
  SPRING_RABBITMQ_PASSWORD: quizzler-mq
  SPRING_RABBITMQ_VIRTUAL_HOST: quizzler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quizzler-api
  namespace: quizzler
  labels:
    app: quizzler-api
spec:
  replicas: 2
  # Zero-downtime rolling update: never drop below the desired replica count.
  # A new pod must pass its readiness probe before an old one is removed.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: quizzler-api
  template:
    metadata:
      labels:
        app: quizzler-api
    spec:
      containers:
        - name: quizzler-api
          image: quizzler-api:kind
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: quizzler-api-config
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: quizzler-api
  namespace: quizzler
spec:
  selector:
    app: quizzler-api
  ports:
    - port: 8080
      targetPort: 8080
