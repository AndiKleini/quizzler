# quizzler-db: single-instance PostgreSQL (public image), the only pod that does
# NOT run two replicas. Backed by a PVC so the seeded data survives pod restarts.
# ConfigMap with custom pg_hba.conf to allow connections from the pod network
# (required for macOS Kind networking where connections appear from 10.244.0.1)
apiVersion: v1
kind: ConfigMap
metadata:
  name: quizzler-db-config
  namespace: quizzler
data:
  custom-pg_hba.conf: |
    # TYPE  DATABASE        USER            ADDRESS                 METHOD
    # "local" is for Unix domain socket connections only
    local   all             all                                     trust
    # IPv4 local connections:
    host    all             all             127.0.0.1/32            trust
    # IPv6 local connections:
    host    all             all             ::1/128                 trust
    # Allow replication connections from localhost
    local   replication     all                                     trust
    host    replication     all             127.0.0.1/32            trust
    host    replication     all             ::1/128                 trust
    # Allow connections from the Kubernetes pod network (required for macOS Kind)
    host    all             all             10.244.0.0/16           md5
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: quizzler-db-data
  namespace: quizzler
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: quizzler-db-credentials
  namespace: quizzler
type: Opaque
stringData:
  POSTGRES_DB: quizzler
  POSTGRES_USER: quizzler
  POSTGRES_PASSWORD: quizzler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quizzler-db
  namespace: quizzler
  labels:
    app: quizzler-db
spec:
  replicas: 1
  strategy:
    # A single instance bound to a RWO volume must not run two pods at once.
    type: Recreate
  selector:
    matchLabels:
      app: quizzler-db
  template:
    metadata:
      labels:
        app: quizzler-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: quizzler-db-credentials
          env:
            # Keep data in a subdirectory so the volume's lost+found does not
            # collide with Postgres' empty-dir initialisation check.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            # Allow password-authenticated connections from any IP (needed for macOS Kind networking)
            - name: POSTGRES_HOST_AUTH_METHOD
              value: md5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: pg-hba-config
              mountPath: /pg_hba_custom.conf
              subPath: custom-pg_hba.conf
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    # Wait for PostgreSQL to initialize, then replace pg_hba.conf
                    while [ ! -f /var/lib/postgresql/data/pgdata/pg_hba.conf ]; do sleep 1; done
                    cp /pg_hba_custom.conf /var/lib/postgresql/data/pgdata/pg_hba.conf
                    # Reload PostgreSQL configuration
                    psql -U quizzler -d postgres -c "SELECT pg_reload_conf();" 2>/dev/null || true
          # A fresh initdb (plus the postStart pg_hba reload) can take a while on a
          # constrained kind node. The startupProbe suspends the liveness and
          # readiness probes until Postgres first accepts connections, giving it up
          # to failureThreshold*periodSeconds = 150s to start without being killed.
          # Once it succeeds, the tighter liveness/readiness timings take over.
          startupProbe:
            exec:
              command: ["pg_isready", "-U", "quizzler", "-d", "quizzler"]
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "quizzler", "-d", "quizzler"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "quizzler", "-d", "quizzler"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: quizzler-db-data
        - name: pg-hba-config
          configMap:
            name: quizzler-db-config
---
apiVersion: v1
kind: Service
metadata:
  name: quizzler-db
  namespace: quizzler
spec:
  # NodePort so the DB is reachable from the host on localhost:5432 via the
  # cluster's extraPortMapping (30432 -> 5432). In-cluster clients keep using
  # the service DNS quizzler-db:5432 on the ClusterIP unchanged.
  type: NodePort
  selector:
    app: quizzler-db
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30432
