# payment-ui: Angular app served by nginx, 2 replicas.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-ui
  namespace: payment
  labels:
    app: payment-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-ui
  template:
    metadata:
      labels:
        app: payment-ui
    spec:
      containers:
        - name: payment-ui
          image: payment-ui:kind
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: payment-ui
  namespace: payment
spec:
  selector:
    app: payment-ui
  ports:
    - port: 80
      targetPort: 80
