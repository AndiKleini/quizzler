# payment-db: single-instance PostgreSQL (public image), the only pod that does
# NOT run two replicas. Backed by a PVC so payment data survives pod restarts.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: payment-db-data
  namespace: payment
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: payment-db-credentials
  namespace: payment
type: Opaque
stringData:
  POSTGRES_DB: payment
  POSTGRES_USER: payment
  POSTGRES_PASSWORD: payment
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-db
  namespace: payment
  labels:
    app: payment-db
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: payment-db
  template:
    metadata:
      labels:
        app: payment-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: payment-db-credentials
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "payment", "-d", "payment"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "payment", "-d", "payment"]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: payment-db-data
---
apiVersion: v1
kind: Service
metadata:
  name: payment-db
  namespace: payment
spec:
  # NodePort so the DB is reachable from the host on localhost:5433 via the
  # cluster's extraPortMapping (30433 -> 5433). In-cluster clients keep using
  # the service DNS payment-db:5432 on the ClusterIP unchanged.
  type: NodePort
  selector:
    app: payment-db
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30433
