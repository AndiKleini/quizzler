# payment-api: Spring Boot backend, 2 replicas. It only needs its own database;
# the merchant (quizzler-api) hands it the webhook/redirect URLs at runtime.
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-api-config
  namespace: payment
data:
  SPRING_DATASOURCE_URL: jdbc:postgresql://payment-db:5432/payment
  SPRING_DATASOURCE_USERNAME: payment
  SPRING_DATASOURCE_PASSWORD: payment
  CORS_ALLOWED_ORIGINS: http://payment.localhost
  # RabbitMQ lives in the dedicated messaging namespace; publish payment-confirmed events to it.
  SPRING_RABBITMQ_HOST: rabbitmq.messaging.svc.cluster.local
  SPRING_RABBITMQ_PORT: "5672"
  SPRING_RABBITMQ_USERNAME: quizzler-mq
  SPRING_RABBITMQ_PASSWORD: quizzler-mq
  SPRING_RABBITMQ_VIRTUAL_HOST: quizzler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: payment
  labels:
    app: payment-api
spec:
  replicas: 2
  # Zero-downtime rolling update: never drop below the desired replica count.
  # A new pod must pass its readiness probe before an old one is removed.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
    spec:
      containers:
        - name: payment-api
          image: payment-api:kind
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: payment-api-config
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: payment-api
  namespace: payment
spec:
  selector:
    app: payment-api
  ports:
    - port: 8081
      targetPort: 8081
