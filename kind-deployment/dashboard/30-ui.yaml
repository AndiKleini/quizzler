# dashboard-ui: Angular app served by nginx, 2 replicas.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-ui
  namespace: dashboard
  labels:
    app: dashboard-ui
spec:
  replicas: 2
  # Zero-downtime rolling update: never drop below the desired replica count.
  # A new pod must pass its readiness probe before an old one is removed.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: dashboard-ui
  template:
    metadata:
      labels:
        app: dashboard-ui
    spec:
      containers:
        - name: dashboard-ui
          image: dashboard-ui:kind
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-ui
  namespace: dashboard
spec:
  selector:
    app: dashboard-ui
  ports:
    - port: 80
      targetPort: 80
