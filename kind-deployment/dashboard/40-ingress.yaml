# Ingress rules for the dashboard capability.
#   dashboard.localhost      -> dashboard-ui  (the SPA)
#   api.dashboard.localhost  -> dashboard-api (consumed by the SPA from the browser)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dashboard
  namespace: dashboard
spec:
  ingressClassName: nginx
  rules:
    - host: dashboard.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard-ui
                port:
                  number: 80
    - host: api.dashboard.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard-api
                port:
                  number: 8080
