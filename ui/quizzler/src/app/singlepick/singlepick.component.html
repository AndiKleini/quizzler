<div *ngIf="singlePickQuestion() as question" [formGroup]="singlePickForm" class="question-container">
    <div class="question-title">{{question.title}}</div>
    <div class="question-text"> {{question.text}} </div>
    <div *ngFor='let option of question.options;' class="option-item" id="optcontainer-{{option.id}}"
        [ngClass]="{
            'selected': option.id.toString() === this.singlePickForm.get('selectedOption')?.value,
            'correct': isEvaluated() && option.id === correctOption(),
            'false': isEvaluated() && option.id !== correctOption()
        }">
        <input id="{{option.id}}" type="radio" class="option-checkbox"
            [value]="option.id"
            formControlName="selectedOption" #selectedOption [attr.disabled]="isEvaluated() ? true : null">
        <div class="option-text">
            <label for="{{option.id}}"><span class="option-label">({{option.id}})</span> {{option.text}}
            </label>
        </div>
    </div>
    <div>
        <button *ngIf="!isEvaluated()" type="submit" (click)="submit()" [disabled]="singlePickForm.invalid" class="question-submit"> Submit </button>
        <span *ngIf="isEvaluated()" class="question-evaluated-label"> evaluated </span>
    </div>
</div>
