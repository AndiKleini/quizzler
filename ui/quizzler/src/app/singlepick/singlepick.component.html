<div *ngIf="singlePickQuestion() as question" [formGroup]="singlePickForm" class="card">
    <div class="title">{{question.title}}</div>
    <div class="subtitle"> {{question.text}} </div>
    <div *ngFor='let option of question.options; let number = index;'  class="option-item" id="optcontainer-{{option.id}}"
        [ngClass]="{
            'selected': option.id.toString() === this.singlePickForm.get('selectedOption')?.value,
            'correct': isEvaluated() && option.id === correctOption(),
            'false': isEvaluated() && option.id !== correctOption()
        }">
        <input id="{{option.id}}" type="radio" class="option-checkbox"
            [value]="option.id"
            formControlName="selectedOption" #selectedOption [attr.disabled]="isEvaluated() ? true : null">
        <div class="option-text">
            <label for="{{option.id}}"><span class="option-label">({{ number + 1 }})</span> {{option.text}}
            </label>
        </div>
    </div>
    <div>
        <button *ngIf="!isEvaluated()" type="submit" (click)="submit()" [disabled]="singlePickForm.invalid" class="btn btn-primary btn-block"> Submit </button>
        <p *ngIf="isEvaluated()" class="message question-evaluated-label"
            [ngClass]="isAnswerCorrect() ? 'message-correct' : 'message-error'">
            {{ isAnswerCorrect() ? 'Correct' : 'Wrong' }}
        </p>
    </div>
</div>
