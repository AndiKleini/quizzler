<p>singlepick works!</p>
<h2>{{singlePickQuestion.title}}</h2>
<label>{{singlePickQuestion.text}}</label>
<div [formGroup]="singlePickForm" >
    <div *ngFor='let option of singlePickQuestion.options;' >
        <input id="{{option.id}}" type="radio" 
            [value]="option.id"
            formControlName="selectedOption"/>
        <label for="{{option.id}}">{{option.text}}</label>
    </div>
    <button type="submit" (click)="submit()">Evaluate</button>
</div>
