<div>
    <div class="div-table">
      <div class="div-table-row">
        <label class="div-table-row-question label-question">
        {{ (question$ | async )?.text }}
        </label>
      </div>
    </div>
    <div class="div-table"> 
      <div *ngFor="let option of (question$ | async)?.options" class="div-table-row">
          <div class="div-table-cell div-table-cell-checkbox">
            <input type="checkbox" class="largeCheckbox"/>
          </div>
          <div class="div-table-cell div-table-cell-selection-text">
            <label class="label-question">{{ option.text }}</label>
          </div>
        </div>
    </div>
  </div>
