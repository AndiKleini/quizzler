# Whole-system bring-up for local testing.
#
# This is the "first testing step" toward the KIND deployment: every container
# is exposed on localhost so the browser-facing URLs the Angular apps hard-code
# (http://localhost:8080, :8081, :4200, :4201) resolve without any code change.
#
# Host port map:
#   quizzler-ui   -> http://localhost:4200
#   payment-ui    -> http://localhost:4201
#   dashboard-ui  -> http://localhost:4202
#   quizzler-api  -> http://localhost:8080
#   payment-api   -> http://localhost:8081
#   dashboard-api -> http://localhost:8082
#   quizzler-db   -> localhost:5432
#   payment-db    -> localhost:5433
#   dashboard-db  -> localhost:1433
#   quizzler-mq   -> localhost:15672 (management port)
#
# Seed: quizzler-api's existing SeedDataInitializer (a CommandLineRunner) seeds
# the quizzler database on first startup against an empty schema, so quizzler-db
# comes up seeded once the stack is healthy. It is idempotent on restarts.

services:
  # --- Infrastructure: PostgreSQL (public image) ---------------------------
  quizzler-db:
    image: postgres:16-alpine
    container_name: quizzler-db-dc
    environment:
      POSTGRES_DB: quizzler
      POSTGRES_USER: quizzler
      POSTGRES_PASSWORD: quizzler
    ports:
      - "5432:5432"
    volumes:
      - quizzler-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizzler -d quizzler"]
      interval: 5s
      timeout: 5s
      retries: 10

  payment-db:
    image: postgres:16-alpine
    container_name: payment-db-dc
    environment:
      POSTGRES_DB: payment
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment
    ports:
      - "5433:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d payment"]
      interval: 5s
      timeout: 5s
      retries: 10

  dashboard-db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: dashboard-db-dc
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: Dboard123!
      MSSQL_PID: Developer
    # Pin to a 2-CPU set so SQL Server's SQLPal startup assert
    # `result * coreCount == procCount` always holds. On hybrid Intel CPUs
    # (e.g. i7-12700H: P-cores x2 threads + E-cores x1 thread) the host
    # topology is non-uniform and the assert crashes at startup. A 2-CPU set is
    # uniform on every machine (either 1 core x2 threads or 2 cores x1 thread,
    # both satisfy the assert) and CPUs 0-1 exist everywhere, including the
    # Docker Desktop VM on macOS. MSSQL_ENABLE_NUMA targets a different layer
    # and does not prevent this crash.
    cpuset: "0-1"
    ports:
      - "1433:1433"
    volumes:
      - dashboard-db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Dboard123! -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Infrastructure: RabbitMQ (public image) -----------------------------------------------
  quizzler-mq:
    image: rabbitmq:3-management-alpine
    container_name: quizzler-mq-dc
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI (guest:guest, but we override to quizzler-mq/quizzler-mq below)
    environment:
      RABBITMQ_DEFAULT_USER: quizzler-mq
      RABBITMQ_DEFAULT_PASS: quizzler-mq
      RABBITMQ_DEFAULT_VHOST: quizzler
    volumes:
      - quizzler-mq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmqctl -q status || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10   
  
    # --- Backends ------------------------------------------------------------
  quizzler-api:
    build:
      context: ./api/quizzler
    container_name: quizzler-api-dc
    depends_on:
      quizzler-db:
        condition: service_healthy
      quizzler-mq:
        condition: service_healthy
    environment:
      # Reach the database over the compose network.
      SPRING_DATASOURCE_URL: jdbc:postgresql://quizzler-db:5432/quizzler
      SPRING_DATASOURCE_USERNAME: quizzler
      SPRING_DATASOURCE_PASSWORD: quizzler
      # Server-to-server: quizzler-api -> payment-api (in-cluster DNS).
      PAYMENT_API_BASE_URL: http://payment-api:8081
      # Handed to payment-api as the success webhook, called back in-cluster.
      QUIZZLER_API_BASE_URL: http://quizzler-api:8080
      # Browser redirect target after payment -> must be the host-exposed URL.
      QUIZZLER_UI_BASE_URL: http://localhost:4200
      # Consume payment-confirmed events over the compose network.
      SPRING_RABBITMQ_HOST: quizzler-mq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: quizzler-mq
      SPRING_RABBITMQ_PASSWORD: quizzler-mq
      SPRING_RABBITMQ_VIRTUAL_HOST: quizzler
    ports:
      - "8080:8080"

  payment-api:
    build:
      context: ./api/payment
    container_name: payment-api-dc
    depends_on:
      payment-db:
        condition: service_healthy
      quizzler-mq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-db:5432/payment
      SPRING_DATASOURCE_USERNAME: payment
      SPRING_DATASOURCE_PASSWORD: payment
      # Publish payment-confirmed events over the compose network.
      SPRING_RABBITMQ_HOST: quizzler-mq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: quizzler-mq
      SPRING_RABBITMQ_PASSWORD: quizzler-mq
      SPRING_RABBITMQ_VIRTUAL_HOST: quizzler
    ports:
      - "8081:8081"

  dashboard-api:
    build:
      context: ./api/dashboard
    container_name: dashboard-api-dc
    depends_on:
      dashboard-db:
        condition: service_healthy
      quizzler-mq:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=dashboard-db,1433;Database=dashboard;User Id=sa;Password=Dboard123!;TrustServerCertificate=True"
      RabbitMQ__Hostname: quizzler-mq
      RabbitMQ__Username: quizzler-mq
      RabbitMQ__Password: quizzler-mq
      RabbitMQ__QueueName: quizzler.notifications
      RabbitMQ__ExchangeName: quizzler.exchange
      RabbitMQ__RoutingKey: quizzler.notifications
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8082:8080"

  # --- Frontends (static bundles served by nginx) --------------------------
  quizzler-ui:
    build:
      context: ./ui/quizzler
    container_name: quizzler-ui-dc
    depends_on:
      - quizzler-api
    ports:
      - "4200:80"

  payment-ui:
    build:
      context: ./ui/payment
    container_name: payment-ui-dc
    depends_on:
      - payment-api
    ports:
      - "4201:80"

  dashboard-ui:
    build:
      context: ./ui/dashboard
    container_name: dashboard-ui-dc
    depends_on:
      - dashboard-api
    ports:
      - "4202:80"

volumes:
  quizzler-db-data:
  payment-db-data:
  dashboard-db-data:
  quizzler-mq-data:
